<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Liste de courses</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #16a34a;
      --green-light: #dcfce7;
      --green-dark:  #15803d;
      --bg:          #f3f4f6;
      --surface:     #ffffff;
      --text:        #111827;
      --muted:       #6b7280;
      --border:      #e5e7eb;
      --shadow:      0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
      --radius:      14px;
      --radius-sm:   10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 440px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .app-header {
      background: var(--green);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .app-header h1 { font-size: 1.1rem; font-weight: 700; }
    .header-right  { display: flex; align-items: center; gap: 8px; }
    .chip {
      background: rgba(255,255,255,0.22);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
    }
    .btn-ghost {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-ghost:active { background: rgba(255,255,255,0.3); }

    /* ── Real-time dot ── */
    #rt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #rt-dot.connected { background: #86efac; }
    #rt-dot.error     { background: #fca5a5; }

    /* ── Views ── */
    .view { padding: 20px 16px; }
    .hidden { display: none !important; }

    /* ── Home ── */
    .home-hero {
      text-align: center;
      padding: 36px 0 28px;
    }
    .cart-icon {
      width: 60px; height: 60px;
      background: var(--green);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 4px 14px rgba(22,163,74,0.35);
    }
    .home-hero h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .home-hero p { color: var(--muted); font-size: 0.9rem; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── User buttons ── */
    .user-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      transition: border-color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .user-btn:last-child { margin-bottom: 0; }
    .user-btn:active { border-color: var(--green); background: var(--green-light); }

    .avatar {
      width: 36px; height: 36px;
      background: var(--green);
      color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 0.88rem;
      flex-shrink: 0;
    }

    .empty-msg { text-align: center; color: var(--muted); font-size: 0.88rem; padding: 4px 0 8px; }

    /* ── Form row ── */
    .form-row { display: flex; gap: 8px; }

    input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      color: var(--text);
      background: white;
      outline: none;
      min-width: 0;
      transition: border-color 0.12s;
    }
    input[type="text"]:focus { border-color: var(--green); }
    input[type="text"]::placeholder { color: #9ca3af; }

    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, transform 0.1s;
    }
    .btn-primary { background: var(--green); color: white; }
    .btn-primary:active { background: var(--green-dark); transform: scale(0.97); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      transition: all 0.15s;
    }
    .tab.active { background: var(--green); color: white; font-weight: 600; }

    /* ── Section header ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title { font-weight: 600; font-size: 0.88rem; color: var(--muted); }
    .badge {
      background: var(--green-light);
      color: var(--green-dark);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    /* ── Item ── */
    .item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .item.done { opacity: 0.5; }

    .check-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .item.done .check-circle { background: var(--green); border-color: var(--green); }
    .check-icon { opacity: 0; transition: opacity 0.15s; color: white; }
    .item.done .check-icon { opacity: 1; }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 0.95rem;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .item.done .item-name { text-decoration: line-through; color: var(--muted); }
    .item-author { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    /* ── Loading spinner ── */
    .loading {
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 44px 20px;
      color: var(--muted);
    }
    .empty svg { margin-bottom: 14px; opacity: 0.25; display: block; margin-left: auto; margin-right: auto; }
    .empty p { font-size: 0.9rem; line-height: 1.6; }

    /* ── Error banner ── */
    .error-banner {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

<!-- ════════════ HOME ════════════ -->
<div id="home">
  <div class="view">
    <div class="home-hero">
      <div class="cart-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </div>
      <h1>Liste de courses</h1>
      <p>Partagée en temps réel sur tous les appareils</p>
    </div>

    <div class="card">
      <div class="card-title">Qui es-tu ?</div>
      <div id="user-list"></div>
    </div>

    <div class="card">
      <div class="card-title">Nouveau prénom</div>
      <div class="form-row">
        <input type="text" id="new-name" placeholder="Entrer un prénom…" maxlength="20" autocomplete="off">
        <button class="btn btn-primary" id="create-btn">Créer</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════ APP ════════════ -->
<div id="app" class="hidden">
  <header class="app-header">
    <h1>Liste de courses</h1>
    <div class="header-right">
      <div id="rt-dot" title="Connexion temps réel"></div>
      <span class="chip" id="user-chip"></span>
      <button class="btn-ghost" id="logout-btn">Changer</button>
    </div>
  </header>

  <div class="view">
    <div class="tabs">
      <button class="tab active" data-tab="add">+ Ajouter</button>
      <button class="tab"        data-tab="list">La liste</button>
    </div>

    <!-- ── Add panel ── -->
    <div id="panel-add">
      <div class="card" style="margin-bottom:18px">
        <div class="card-title">Nouvel article</div>
        <div class="form-row">
          <input type="text" id="item-input" placeholder="Pain, lait, tomates…" maxlength="60" autocomplete="off">
          <button class="btn btn-primary" id="add-btn">Ajouter</button>
        </div>
      </div>
      <div class="section-header">
        <span class="section-title">Mes articles</span>
        <span class="badge" id="my-count">0</span>
      </div>
      <div id="my-items"></div>
    </div>

    <!-- ── List panel ── -->
    <div id="panel-list" class="hidden">
      <div class="section-header">
        <span class="section-title">Tous les articles</span>
        <span class="badge" id="all-count">0</span>
      </div>
      <div id="all-items"></div>
    </div>
  </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';

// ── Supabase client
const { createClient } = window.supabase;
const db = createClient(
  'https://epsocrlmmkodlidbtdpz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwc29jcmxtbWtvZGxpZGJ0ZHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDk4NDgsImV4cCI6MjA5MTcyNTg0OH0.UL5ZR7fVb7BbizL6zfKklmXqQFO85tJ3FyL6NxzJzcs'
);

// ── State
let currentUser = null;
let activeTab   = 'add';

// ── Helpers
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Supabase queries — utilisateurs
async function fetchUsers() {
  const { data, error } = await db
    .from('utilisateurs')
    .select('*')
    .order('cree_le', { ascending: true });
  if (error) { console.error('Supabase users fetch error:', error); return null; }
  return data;
}

async function insertUser(prenom) {
  const { data, error } = await db
    .from('utilisateurs')
    .insert({ prenom })
    .select()
    .single();
  if (error) { console.error('Supabase user insert error:', error); return null; }
  return data;
}

// ── Supabase queries — items
async function fetchItems() {
  const { data, error } = await db
    .from('items')
    .select('*')
    .order('cree_le', { ascending: false });
  if (error) { console.error('Supabase fetch error:', error); return null; }
  return data;
}

async function insertItem(texte) {
  const { error } = await db
    .from('items')
    .insert({ texte, auteur: currentUser, coche: false });
  if (error) { console.error('Supabase insert error:', error); return false; }
  return true;
}

async function updateCoche(id, coche) {
  const { error } = await db
    .from('items')
    .update({ coche })
    .eq('id', id);
  if (error) { console.error('Supabase update error:', error); return false; }
  return true;
}

// ── Real-time subscription
function setupRealtime() {
  const dot = document.getElementById('rt-dot');
  db.channel('items-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'items' }, () => {
      if (!currentUser) return;
      if (activeTab === 'add')  renderMyItems();
      else                      renderAllItems();
    })
    .subscribe(status => {
      dot.className = status === 'SUBSCRIBED' ? 'connected' : status === 'CHANNEL_ERROR' ? 'error' : '';
    });
}

// ── Home
async function renderHome() {
  const container = document.getElementById('user-list');
  showLoading(container);

  const users = await fetchUsers();
  if (users === null) {
    showError(container, 'Impossible de charger les utilisateurs. Vérifiez votre connexion.');
    return;
  }
  if (users.length === 0) {
    container.innerHTML = '<p class="empty-msg">Personne pour l\'instant — crée un prénom !</p>';
    return;
  }
  container.innerHTML = users.map(u => `
    <button class="user-btn" data-name="${esc(u.prenom)}">
      <div class="avatar">${esc(u.prenom.charAt(0).toUpperCase())}</div>
      <span>${esc(u.prenom)}</span>
    </button>
  `).join('');
  container.querySelectorAll('.user-btn').forEach(btn =>
    btn.addEventListener('click', () => login(btn.dataset.name))
  );
}

async function createUser() {
  const input = document.getElementById('new-name');
  const prenom = input.value.trim();
  if (!prenom) { input.focus(); return; }

  const btn = document.getElementById('create-btn');
  btn.disabled = true;
  input.value = '';

  // Si le prénom existe déjà, se connecter directement
  const users = await fetchUsers();
  if (users && users.find(u => u.prenom === prenom)) {
    btn.disabled = false;
    login(prenom);
    return;
  }

  const user = await insertUser(prenom);
  btn.disabled = false;

  if (!user) {
    input.value = prenom;
    showError(document.getElementById('user-list'), 'Impossible de créer l\'utilisateur. Vérifiez votre connexion.');
    return;
  }
  login(user.prenom);
}

document.getElementById('create-btn').addEventListener('click', createUser);
document.getElementById('new-name').addEventListener('keydown', e => { if (e.key === 'Enter') createUser(); });

// ── Login / logout
function login(name) {
  currentUser = name;
  document.getElementById('home').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('user-chip').textContent = name;
  switchTab('add');
}

document.getElementById('logout-btn').addEventListener('click', () => {
  currentUser = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  renderHome();
});

// ── Tabs
document.querySelectorAll('.tab').forEach(btn =>
  btn.addEventListener('click', () => switchTab(btn.dataset.tab))
);

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  document.getElementById('panel-add').classList.toggle('hidden',  tab !== 'add');
  document.getElementById('panel-list').classList.toggle('hidden', tab !== 'list');
  if (tab === 'add')  renderMyItems();
  if (tab === 'list') renderAllItems();
}

// ── Add item
async function addItem() {
  const input = document.getElementById('item-input');
  const texte = input.value.trim();
  if (!texte) { input.focus(); return; }

  // Disable button while inserting
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  input.value = '';

  const ok = await insertItem(texte);
  btn.disabled = false;
  input.focus();

  if (ok) renderMyItems();
  else showError('my-items', 'Impossible d\'ajouter l\'article. Vérifiez votre connexion.');
}

document.getElementById('add-btn').addEventListener('click', addItem);
document.getElementById('item-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

// ── Attach click listeners on items
function attachListeners(container) {
  container.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', async () => {
      const id    = el.dataset.id;
      const coche = el.dataset.coche === 'true';

      // Optimistic UI update
      el.classList.toggle('done', !coche);
      el.dataset.coche = String(!coche);
      el.querySelector('.check-circle').style.transition = 'none';

      await updateCoche(id, !coche);
    });
  });
}

// ── Render: my items
async function renderMyItems() {
  const container = document.getElementById('my-items');
  showLoading(container);

  const items = await fetchItems();
  if (items === null) { showError(container, 'Erreur de chargement. Vérifiez votre connexion.'); return; }

  const mine = items.filter(i => i.auteur === currentUser);
  document.getElementById('my-count').textContent = mine.filter(i => !i.coche).length;

  if (mine.length === 0) {
    container.innerHTML = emptyState('Vous n\'avez encore rien ajouté.<br>Commencez par entrer un article !');
    return;
  }
  const sorted = [...mine].sort((a, b) => a.coche - b.coche);
  container.innerHTML = sorted.map(i => itemHTML(i, false)).join('');
  attachListeners(container);
}

// ── Render: all items
async function renderAllItems() {
  const container = document.getElementById('all-items');
  showLoading(container);

  const items = await fetchItems();
  if (items === null) { showError(container, 'Erreur de chargement. Vérifiez votre connexion.'); return; }

  document.getElementById('all-count').textContent = items.filter(i => !i.coche).length;

  if (items.length === 0) {
    container.innerHTML = emptyState('La liste est vide.<br>Ajoutez des articles depuis votre onglet !');
    return;
  }
  const sorted = [...items].sort((a, b) => a.coche - b.coche || a.auteur.localeCompare(b.auteur));
  container.innerHTML = sorted.map(i => itemHTML(i, true)).join('');
  attachListeners(container);
}

// ── HTML builders
function itemHTML(item, showAuthor) {
  return `
    <div class="item${item.coche ? ' done' : ''}" data-id="${esc(String(item.id))}" data-coche="${item.coche}">
      <div class="check-circle">
        <svg class="check-icon" width="11" height="11" viewBox="0 0 11 11" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,5.5 4.5,8.5 9.5,2.5"/>
        </svg>
      </div>
      <div class="item-info">
        <div class="item-name">${esc(item.texte)}</div>
        ${showAuthor ? `<div class="item-author">Ajouté par <strong>${esc(item.auteur)}</strong></div>` : ''}
      </div>
    </div>
  `;
}

function emptyState(msg) {
  return `
    <div class="empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <p>${msg}</p>
    </div>
  `;
}

function showLoading(container) {
  if (typeof container === 'string') container = document.getElementById(container);
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
}

function showError(container, msg) {
  if (typeof container === 'string') container = document.getElementById(container);
  container.innerHTML = `<div class="error-banner">${esc(msg)}</div>`;
}

// ── Init
setupRealtime();
renderHome();
</script>
</body>
</html>

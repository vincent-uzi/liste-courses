<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f2f2f7">
  <title>Uzi List</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;max-width:100%}
    :root{
      --bg:#f2f2f7;--card:rgba(255,255,255,0.9);--text:#1c1c1e;--text2:#6b6b6b;
      --blue:#1a6bb5;--border:rgba(0,0,0,0.08);--r:16px;--r2:12px;
    }
    html,body{width:100%;height:100%;overflow:hidden;overflow-x:hidden;max-width:100vw;position:relative;background:var(--bg)}
    #root{width:100%;height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--text)}

    .app{position:relative;width:100%;height:100%;max-width:430px;margin:0 auto;overflow:hidden;contain:layout style}
    .screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);padding-bottom:env(safe-area-inset-bottom,0)}

    .sec{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:600}
    .card{background:var(--card);border-radius:var(--r);border:.5px solid var(--border)}

    /* ── Avatar ── */
    .av{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;user-select:none}
    .av-lg{width:40px;height:40px;font-size:14px}
    .av-md{width:34px;height:34px;font-size:13px}
    .av-sm{width:28px;height:28px;font-size:11px}

    /* ══ SCREEN A ══ */
    .sa{padding:60px 20px 40px;display:flex;flex-direction:column;min-height:100%}
    .sa-logo{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
    .sa-sub{color:var(--text2);font-size:15px;margin-bottom:40px}
    .user-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:var(--r);border:.5px solid var(--border);cursor:pointer;margin-bottom:8px;transition:transform .1s,background .1s}
    .user-btn:hover{background:rgba(255,255,255,1)}
    .user-btn:active{transform:scale(.98)}
    .user-btn-name{font-size:15px;font-weight:500}

    /* ══ SCREEN B ══ */
    .sb-head{padding:16px 16px 0}
    .sb-foyer-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:600;margin-bottom:2px}
    .sb-foyer-name{font-size:24px;font-weight:700;letter-spacing:-.8px;margin-bottom:16px}
    .hero-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 12px}
    .hero-block{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);padding:16px;cursor:pointer;transition:transform .1s,background .1s}
    .hero-block:hover{background:rgba(255,255,255,1)}
    .hero-block:active{transform:scale(.97)}
    .hero-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:600;margin-bottom:8px}
    .hero-count{font-size:36px;font-weight:800;letter-spacing:-1.5px}
    .hero-sub{font-size:12px;color:var(--text2);margin-top:2px}

    /* Add block */
    .add-block{margin:0 16px 12px;border-radius:var(--r);border:.5px solid var(--border);padding:16px}
    .add-micro{font-size:13px;color:var(--text2);margin-bottom:10px;font-style:italic}
    .add-row{display:flex;gap:10px;align-items:center}
    .add-input{flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r2);font-size:15px;background:#fff;color:var(--text);outline:none;min-width:0;transition:border-color .15s}
    .add-input:focus{border-color:var(--blue)}
    .add-btn{width:48px;height:48px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .1s,filter .1s}
    .add-btn:hover{filter:brightness(1.1)}
    .add-btn:active{transform:scale(.95)}
    .add-btn:disabled{opacity:.5}

    /* ══ Events section ══ */
    .ev-wrap-outer{margin:0 16px 20px}
    .ev-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .ev-add-btn{width:26px;height:26px;border-radius:50%;background:var(--blue);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;flex-shrink:0}
    .ev-add-btn:active{transform:scale(.9)}
    .ev-card{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);overflow:hidden}

    .ev-wrap{position:relative;border-bottom:.5px solid var(--border);overflow:hidden}
    .ev-wrap:last-child{border-bottom:none}
    .ev-del-bg{position:absolute;inset:0;background:#ff3b30}
    .ev-del-btn{position:absolute;right:0;top:0;bottom:0;width:80px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .ev-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#fff;position:relative;z-index:1;will-change:transform}
    .ev-date-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
    .ev-date-box{display:flex;flex-direction:column;align-items:center;border:.5px solid rgba(0,0,0,.12);border-radius:8px;padding:5px 8px;min-width:44px;text-align:center;flex-shrink:0}
    .ev-day-abbr{font-size:7px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;line-height:1.5}
    .ev-day-num{font-size:16px;font-weight:700;line-height:1.1}
    .ev-day-month{font-size:7px;color:var(--text2);line-height:1.5}
    .ev-time-pill{background:#f2f2f7;border-radius:20px;padding:2px 8px;font-size:10px;color:var(--text2);font-weight:500;white-space:nowrap}
    .ev-content{flex:1;min-width:0}
    .ev-line1{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
    .ev-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
    .ev-ics-btn{background:none;border:none;padding:0;cursor:pointer;color:var(--blue);flex-shrink:0;display:flex;align-items:center}
    .ev-line2{display:flex;align-items:center;gap:4px}
    .ev-dur{font-size:12px;color:var(--text2)}
    .ev-empty{text-align:center;color:var(--text2);font-size:14px;padding:18px 0}

    /* ══ SCREEN C ══ */
    .sc-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:.5px solid var(--border)}
    .back-btn{display:flex;align-items:center;gap:4px;color:var(--blue);font-size:17px;cursor:pointer;background:none;border:none;padding:4px 0}
    .sc-count{font-size:17px;font-weight:600}
    .sort-wrap{position:relative}
    .sort-btn{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 8px}
    .sort-dd{position:absolute;right:0;top:110%;background:var(--card);border-radius:var(--r2);border:.5px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:200px;z-index:50;overflow:hidden}
    .sort-opt{padding:12px 16px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
    .sort-opt:hover{background:var(--bg)}
    .sort-opt.sel{color:var(--blue)}
    .sc-items{padding:8px 16px 40px}

    /* Item row */
    .item-wrap{position:relative;margin-bottom:8px;border-radius:var(--r2);overflow:hidden;isolation:isolate}
    .item-del-bg{position:absolute;inset:0;background:#ff3b30;border-radius:var(--r2);z-index:0}
    .item-del-btn{position:absolute;right:0;top:0;bottom:0;width:80px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .item-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-radius:var(--r2);border:.5px solid var(--border);position:relative;z-index:1;will-change:transform}
    @keyframes itemIn{from{transform:translateY(-4px)}to{transform:translateY(0)}}
    .item-new{animation:itemIn 180ms ease-out}
    @keyframes itemOut{from{max-height:80px;opacity:1;margin-bottom:8px}to{max-height:0;opacity:0;margin-bottom:0}}
    .item-out{animation:itemOut 280ms ease-out forwards;overflow:hidden}

    /* Check circle */
    .chk-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:border-color .15s}
    .chk-fill{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:scale(0);transition:transform 250ms ease-out}
    .chk-circle.done .chk-fill{transform:scale(1)}
    .item-name{flex:1;font-size:15px}
    .item-name.done{text-decoration:line-through;color:#aaa}
    .item-rayon{font-size:11px;color:var(--text2);margin-top:1px}
    .sep-row{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:600;padding:14px 0 6px}
    .bought-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px}
    .del-bought-btn{background:none;border:none;font-size:12px;color:#aaa;text-decoration:underline;cursor:pointer}

    /* ══ TOAST ══ */
    .toast-wrap{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;padding:0 16px 36px;z-index:9999;pointer-events:none}
    .toast{background:rgba(255,255,255,.97);border-radius:12px;border:.5px solid rgba(0,0,0,.1);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 24px rgba(0,0,0,.12);pointer-events:all;max-width:380px;width:100%;transform:translateY(80px);opacity:0;transition:transform 200ms ease-out,opacity 200ms ease-out}
    .toast.show{transform:translateY(0);opacity:1}
    .toast-msg{flex:1;font-size:14px;color:var(--text2)}
    .toast-act{font-size:14px;font-weight:600;color:var(--blue);cursor:pointer;background:none;border:none;padding:0;white-space:nowrap}

    /* ══ MODALS ══ */
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeOv 250ms ease-out}
    @keyframes fadeOv{from{opacity:0}to{opacity:1}}
    .modal-sheet{background:var(--bg);border-radius:20px;width:100%;max-width:430px;max-height:88vh;display:flex;flex-direction:column;animation:sheetIn 250ms ease-out;padding-bottom:env(keyboard-inset-height,80px)}
    .modal-body{flex:1;overflow-y:auto;padding:0 16px}
    .modal-footer{padding:8px 16px 0;background:var(--bg);position:sticky;bottom:0}
    @keyframes sheetIn{from{transform:scale(.95) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 14px}
    .modal-title{font-size:20px;font-weight:700}
    .modal-sub{font-size:13px;color:var(--text2);margin-bottom:2px}
    .modal-close{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.08);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2)}

    /* Team modal */
    .team-wrap{overflow:hidden;border-bottom:.5px solid var(--border);position:relative}
    .team-wrap:last-child{border-bottom:none}
    .team-del-bg{position:absolute;inset:0;background:#ff3b30;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;color:#fff;font-size:15px;font-weight:500}
    .team-row{display:flex;align-items:center;gap:12px;padding:10px 0;position:relative;z-index:1;background:var(--bg);will-change:transform}
    .color-picker{position:absolute;right:0;top:50%;transform:translateY(-50%);background:var(--card);border-radius:var(--r2);border:.5px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.1);padding:6px;z-index:20;display:flex;flex-direction:column;gap:4px}
    .c-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
    .c-dot:active{transform:scale(.9)}
    .c-dot.sel{border-color:rgba(0,0,0,.4)}

    /* Event modal fields */
    .ev-modal-sec{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:8px}
    .ev-modal-field{background:#f2f2f7;border-radius:8px;padding:11px 14px;font-size:15px;border:none;width:100%;color:var(--text);outline:none;-webkit-appearance:none}
    .ev-modal-field:focus{box-shadow:0 0 0 2px rgba(26,107,181,.25)}

    /* Concerned row */
    .concerned-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .concern-av{cursor:pointer;transition:opacity .15s;border-radius:50%}
    .concern-av.sel{opacity:1;outline:2px solid #1c1c1e;outline-offset:2px}
    .concern-av:not(.sel){opacity:.4}
    .foyer-toggle{cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:none;padding:0;background:#f2f2f7}
    .foyer-toggle.sel{opacity:1;background:#e0ecf8;outline:2px solid #1c1c1e;outline-offset:2px}
    .foyer-toggle:not(.sel){opacity:.4}

    /* Duration pills */
    .dur-pills{display:flex;gap:8px;flex-wrap:wrap}
    .dur-pill{padding:6px 10px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .15s,color .15s}
    .dur-pill.sel{background:#1a6bb5;color:#fff}
    .dur-pill:not(.sel){background:#f2f2f7;color:#6b6b6b}

    /* ── Custom Date/Time Pickers ── */
    .dt-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .dt-pill{display:inline-flex;align-items:center;gap:5px;background:#f2f2f7;border-radius:20px;padding:8px 14px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;border:none;white-space:nowrap;-webkit-tap-highlight-color:transparent;font-family:inherit;transition:background .1s;line-height:1.2}
    .dt-pill.ph{color:var(--text2)}
    .dt-pill:active{background:#e5e5ea}
    .dt-pop{background:#fff;border-radius:16px;border:.5px solid rgba(0,0,0,.1);box-shadow:0 8px 32px rgba(0,0,0,.18);overflow:hidden;animation:dtPopIn 140ms ease-out}
    @keyframes dtPopIn{from{opacity:0;transform:scale(.93) translateY(-6px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 4px}
    .cal-nav{background:none;border:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text2);line-height:1}
    .cal-nav:active{background:#f2f2f7}
    .cal-ttl{font-size:13px;font-weight:600;color:var(--text)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 10px;gap:1px}
    .cal-wd{font-size:9px;color:var(--text2);font-weight:600;text-align:center;padding:2px 0 5px;text-transform:uppercase;letter-spacing:.3px}
    .cal-d{aspect-ratio:1;border:none;background:none;font-size:13px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);width:100%;font-family:inherit}
    .cal-d.today:not(.sel){color:var(--blue);font-weight:700}
    .cal-d.sel{background:var(--blue);color:#fff;font-weight:700}
    .cal-d.other{color:#c7c7cc}
    .cal-d:active:not(.sel){background:#f2f2f7}
    .t-list{max-height:210px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
    .t-opt{display:block;width:100%;padding:10px 18px;border:none;background:none;font-size:14px;cursor:pointer;color:var(--text);text-align:left;font-family:inherit}
    .t-opt:active{background:#f2f2f7}
    .t-opt.sel{color:var(--blue);font-weight:600;background:#f0f6ff}

    /* Inline add */
    .inline-add{display:flex;gap:8px;padding:10px 16px;background:var(--card);border-radius:var(--r2);border:.5px solid var(--border);margin:8px 16px}
    .inline-input{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);outline:none}
    .inline-btn{background:none;border:none;color:var(--blue);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
    .inline-btn.muted{color:var(--text2)}

    .fab{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:.5px solid var(--border);background:var(--card);font-size:24px;cursor:pointer;color:var(--text2);transition:transform .1s}
    .fab:active{transform:scale(.95)}
    .rt-dot{width:6px;height:6px;border-radius:50%;display:inline-block;background:rgba(0,0,0,.15);transition:background .3s;margin-left:6px}
    .rt-dot.on{background:#34c759}
    .loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:15px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-right:10px}
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script type="text/babel">
  'use strict';

  // ─── CONFIG ───────────────────────────────────────────────────────────────
  const SB_URL = 'https://epsocrlmmkodlidbtdpz.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwc29jcmxtbWtvZGxpZGJ0ZHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDk4NDgsImV4cCI6MjA5MTcyNTg0OH0.UL5ZR7fVb7BbizL6zfKklmXqQFO85tJ3FyL6NxzJzcs';

  const COLORS = ['#7dbfa3','#d4789a','#6a9fd4','#c4a04a','#a78bcc','#e08060','#60b8d4','#98c46a'];
  const db = window.supabase.createClient(SB_URL, SB_KEY);

  const { useState, useEffect, useRef, useCallback, useMemo } = React;
  const { createRoot } = ReactDOM;

  // ─── HELPERS ──────────────────────────────────────────────────────────────
  const initials = p => {
    if (!p) return '?';
    const parts = p.trim().split(/[\s\-]+/);
    return parts.length >= 2 ? (parts[0][0] + parts[1][0]).toUpperCase() : p.slice(0,2).toUpperCase();
  };
  const hex2rgb = h => `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;
  const blendOnWhite = (hex, a) => {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.round(255*(1-a)+r*a)},${Math.round(255*(1-a)+g*a)},${Math.round(255*(1-a)+b*a)})`;
  };
  const uColor = u => u?.couleur || COLORS[0];

  // ─── ANTHROPIC API ────────────────────────────────────────────────────────
  async function categorize(texte, attempt = 0) {
    try {
      const r = await fetch('/api/categorize', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ texte })
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        console.error(`[Rayon] Erreur proxy ${r.status}:`, err?.error || err);
        if (attempt < 1) { console.log('[Rayon] Nouvelle tentative…'); return categorize(texte, attempt + 1); }
        return null;
      }
      const d = await r.json();
      const rayon = d.rayon || null;
      console.log(`[Rayon] "${texte}" → ${rayon}`);
      return rayon;
    } catch (e) {
      console.error('[Rayon] Erreur réseau:', e.message);
      if (attempt < 1) { console.log('[Rayon] Nouvelle tentative…'); return categorize(texte, attempt + 1); }
      return null;
    }
  }

  async function categorizeAndSave(item) {
    const rayon = await categorize(item.texte);
    if (rayon) await db.from('items').update({ rayon }).eq('id', item.id);
    return rayon;
  }

  // ─── ARC ANIMATION ────────────────────────────────────────────────────────
  function arcFly(fromEl, toEl, text, color) {
    if (!fromEl || !toEl) return;
    const fr = fromEl.getBoundingClientRect();
    const to = toEl.getBoundingClientRect();
    const el = document.createElement('div');
    el.textContent = text;
    Object.assign(el.style, {
      position:'fixed', left:fr.left+'px', top:fr.top+'px',
      width:Math.min(fr.width,220)+'px', height:fr.height+'px',
      background:color, borderRadius:'12px', color:'#fff',
      display:'flex', alignItems:'center', padding:'0 14px',
      fontSize:'15px', fontWeight:'500', zIndex:'9998',
      pointerEvents:'none', overflow:'hidden', whiteSpace:'nowrap',
      fontFamily:'-apple-system, sans-serif', textOverflow:'ellipsis'
    });
    document.body.appendChild(el);
    const dx = to.left - fr.left, dy = to.top - fr.top;
    const anim = el.animate([
      { transform:'translate(0,0) scale(1)', opacity:1 },
      { transform:`translate(${dx*.5}px,${dy*.3-30}px) scale(.85)`, opacity:.85, offset:.45 },
      { transform:`translate(${dx}px,${dy}px) scale(.2)`, opacity:0 }
    ], { duration:400, easing:'cubic-bezier(0.34,1.56,0.64,1)', fill:'forwards' });
    anim.onfinish = () => el.remove();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // COMPONENTS
  // ═══════════════════════════════════════════════════════════════════════════

  function Av({ prenom, couleur, size = 'md' }) {
    return <div className={`av av-${size}`} style={{ background: couleur || COLORS[0] }}>{initials(prenom)}</div>;
  }

  // ─── TOAST ────────────────────────────────────────────────────────────────
  function Toast({ toast }) {
    const [show, setShow] = useState(false);
    const timer = useRef(null);
    const cur = useRef(toast);

    useEffect(() => {
      cur.current = toast;
      if (toast) {
        setShow(true);
        clearTimeout(timer.current);
        timer.current = setTimeout(() => {
          setShow(false);
          setTimeout(() => cur.current?.onDone?.(), 250);
        }, 3000);
      } else {
        setShow(false);
      }
      return () => clearTimeout(timer.current);
    }, [toast?.id]);

    if (!toast) return null;
    const cancel = () => {
      clearTimeout(timer.current);
      setShow(false);
      setTimeout(() => { toast.onCancel?.(); toast.onDone?.(); }, 200);
    };
    return (
      <div className="toast-wrap">
        <div className={`toast ${show ? 'show' : ''}`}>
          <span className="toast-msg">{toast.message}</span>
          {toast.onCancel && <button className="toast-act" onClick={cancel}>Annuler</button>}
        </div>
      </div>
    );
  }

  // ─── SWIPEABLE ITEM ROW ───────────────────────────────────────────────────
  const SNAP_W = 80;

  function ItemRow({ item, users, onToggle, onDelete, isNew, isOpen, onOpen }) {
    const [sx, setSx] = useState(0);
    const [deleting, setDeleting] = useState(false);
    const [highlighted, setHighlighted] = useState(false);
    const tx = useRef(null), ty = useRef(null), moving = useRef(false), startSx = useRef(0);
    const rowRef = useRef(null);
    const hlTimer = useRef(null);
    const user = users.find(u => u.prenom === item.auteur);
    const col = uColor(user);

    useEffect(() => { if (!isOpen) setSx(0); }, [isOpen]);

    // Le timer est stocké dans un ref pour survivre au re-render
    // quand isNew repasse à false (400 ms) — sans annuler le délai 1 s.
    useEffect(() => {
      if (isNew) {
        clearTimeout(hlTimer.current);
        setHighlighted(true);
        hlTimer.current = setTimeout(() => setHighlighted(false), 1000);
      }
    }, [isNew]);
    useEffect(() => () => clearTimeout(hlTimer.current), []);

    const onTS = e => {
      tx.current = e.touches[0].clientX;
      ty.current = e.touches[0].clientY;
      startSx.current = sx;
      moving.current = false;
    };

    const onTM = e => {
      if (tx.current === null) return;
      const dx = e.touches[0].clientX - tx.current;
      const dy = Math.abs(e.touches[0].clientY - ty.current);
      if (!moving.current && Math.abs(dx) < 6 && dy < 6) return;
      if (!moving.current && dy > Math.abs(dx)) return;
      moving.current = true;
      e.preventDefault();
      if (dx < 0 && !isOpen) onOpen(item.id);
      const newSx = Math.min(0, Math.max(startSx.current + dx, -SNAP_W * 1.3));
      setSx(newSx);
    };

    const onTE = () => {
      tx.current = null;
      moving.current = false;
      if (sx < -(SNAP_W * 0.4)) {
        setSx(-SNAP_W);
        onOpen(item.id);
      } else {
        setSx(0);
        onOpen(null);
      }
    };

    const handleDelete = () => {
      setDeleting(true);
      setTimeout(() => onDelete(item.id), 270);
    };

    return (
      <div className={`item-wrap${deleting ? ' item-out' : ''}`}>
        <div className="item-del-bg">
          <button className="item-del-btn" onClick={handleDelete}>
            <svg width="18" height="20" viewBox="0 0 18 20" fill="white"><path d="M1 4h16M6 4V2h6v2M2 4l1 14a1 1 0 001 1h10a1 1 0 001-1L16 4" stroke="white" strokeWidth="1.5" strokeLinecap="round" fill="none"/></svg>
          </button>
        </div>
        <div
          ref={rowRef}
          className={`item-row${isNew ? ' item-new' : ''}`}
          style={{
            transform:`translateX(${sx}px)`,
            background: highlighted ? blendOnWhite(col, 0.15) : '#fff',
            transition: tx.current ? 'none' : `transform 300ms ease-out${highlighted ? '' : ', background 600ms ease-out'}`
          }}
          onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        >
          <div
            className={`chk-circle${item.coche ? ' done' : ''}`}
            style={{ borderColor:item.coche ? col : undefined }}
            onClick={() => onToggle(item)}
          >
            <div className="chk-fill" style={{ background:col }}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="1.5,6 5,9.5 10.5,2.5"/>
              </svg>
            </div>
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div className={`item-name${item.coche ? ' done' : ''}`}>{item.texte}</div>
            {item.rayon && <div className="item-rayon">{item.rayon}</div>}
          </div>
          {user && <Av prenom={user.prenom} couleur={col} size="sm" />}
        </div>
      </div>
    );
  }

  // ─── EVENT HELPERS ────────────────────────────────────────────────────────
  const DAYS_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const MONTHS_FR = ['jan','fév','mar','avr','mai','jun','jul','août','sep','oct','nov','déc'];
  const MONTHS_LONG = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const TIME_SLOTS = (() => {
    const s = [];
    for (let m = 8*60; m <= 22*60+30; m += 30) {
      s.push(`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`);
    }
    return s;
  })();
  const DURATIONS = [
    { label:'30 min', val:30 },
    { label:'1 h', val:60 },
    { label:'2 h', val:120 },
    { label:'3 h', val:180 },
    { label:'Journée', val:1440 },
  ];

  function formatDur(min) {
    if (min >= 1440) return 'Journée';
    if (min >= 60) { const h = min / 60; return `${h} heure${h > 1 ? 's' : ''}`; }
    return `${min} min`;
  }

  // ─── EVENT ROW ────────────────────────────────────────────────────────────
  function EventRow({ ev, users, onDelete, isOpen, onOpen }) {
    const [sx, setSx] = useState(0);
    const [deleting, setDeleting] = useState(false);
    const tx = useRef(null), ty = useRef(null), moving = useRef(false), startSx = useRef(0);

    useEffect(() => { if (!isOpen) setSx(0); }, [isOpen]);

    const onTS = e => {
      tx.current = e.touches[0].clientX;
      ty.current = e.touches[0].clientY;
      startSx.current = sx;
      moving.current = false;
    };
    const onTM = e => {
      if (tx.current === null) return;
      const dx = e.touches[0].clientX - tx.current;
      const dy = Math.abs(e.touches[0].clientY - ty.current);
      if (!moving.current && Math.abs(dx) < 6 && dy < 6) return;
      if (!moving.current && dy > Math.abs(dx)) return;
      moving.current = true;
      e.preventDefault();
      if (dx < 0 && !isOpen) onOpen(ev.id);
      setSx(Math.min(0, Math.max(startSx.current + dx, -SNAP_W * 1.3)));
    };
    const onTE = () => {
      tx.current = null;
      moving.current = false;
      if (sx < -(SNAP_W * 0.4)) { setSx(-SNAP_W); onOpen(ev.id); }
      else { setSx(0); onOpen(null); }
    };

    const handleDel = () => { setDeleting(true); setTimeout(() => onDelete(ev.id), 270); };

    const d = new Date(ev.date_debut);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const accent = isToday ? 'var(--blue)' : 'var(--text2)';
    const numColor = isToday ? 'var(--blue)' : 'var(--text)';
    const timeStr = d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });

    const concernedUsers = users.filter(u => Array.isArray(ev.concernes) && ev.concernes.includes(u.prenom));

    const exportIcs = e => {
      e.stopPropagation();
      const pad = n => String(n).padStart(2, '0');
      const fmt = dt => `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
      const start = new Date(ev.date_debut);
      const end = new Date(start.getTime() + ev.duree_minutes * 60000);
      const ics = [
        'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//UziList//FR',
        'BEGIN:VEVENT',
        `UID:${ev.id}@uzilist`,
        `DTSTART:${fmt(start)}`,
        `DTEND:${fmt(end)}`,
        `SUMMARY:${ev.titre}`,
        'DESCRIPTION:',
        'END:VEVENT', 'END:VCALENDAR'
      ].join('\r\n');
      const blob = new Blob([ics], { type:'text/calendar' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${ev.titre}.ics`; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    return (
      <div className={`ev-wrap${deleting ? ' item-out' : ''}`}>
        <div className="ev-del-bg">
          <button className="ev-del-btn" onClick={handleDel}>
            <svg width="18" height="20" viewBox="0 0 18 20" fill="white"><path d="M1 4h16M6 4V2h6v2M2 4l1 14a1 1 0 001 1h10a1 1 0 001-1L16 4" stroke="white" strokeWidth="1.5" strokeLinecap="round" fill="none"/></svg>
          </button>
        </div>
        <div
          className="ev-row"
          style={{ transform:`translateX(${sx}px)`, transition:tx.current?'none':'transform 300ms ease-out' }}
          onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        >
          <div className="ev-date-box">
            <span className="ev-day-abbr" style={{ color:accent }}>{DAYS_FR[d.getDay()]}</span>
            <span className="ev-day-num" style={{ color:numColor }}>{d.getDate()}</span>
            <span className="ev-day-month">{MONTHS_FR[d.getMonth()]}</span>
          </div>
          <div className="ev-content">
            <div className="ev-line1">
              <span className="ev-title">{ev.titre}</span>
              <button className="ev-ics-btn" onClick={exportIcs} title="Exporter .ics">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
              </button>
            </div>
            <div className="ev-line2">
              {concernedUsers.map(u => (
                <div key={u.id} style={{ width:16, height:16, borderRadius:'50%', background:uColor(u), display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:7, fontWeight:700, flexShrink:0 }}>
                  {initials(u.prenom)}
                </div>
              ))}
              {ev.foyer && (
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                  <polyline points="9,22 9,12 15,12 15,22"/>
                </svg>
              )}
              <span className="ev-time-pill">{timeStr}</span>
              <span className="ev-dur">– {formatDur(ev.duree_minutes)}</span>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ─── DATE PICKER PILL ────────────────────────────────────────────────────
  function DatePickerPill({ value, open, onToggle, onChange }) {
    const pillRef = useRef(null);
    const [rect, setRect] = useState(null);
    const [vy, setVy] = useState(() => { const d = value ? new Date(value+'T12:00') : new Date(); return d.getFullYear(); });
    const [vm, setVm] = useState(() => { const d = value ? new Date(value+'T12:00') : new Date(); return d.getMonth(); });
    const today = new Date();

    const handleToggle = () => {
      if (!open && pillRef.current) setRect(pillRef.current.getBoundingClientRect());
      onToggle();
    };

    useEffect(() => {
      if (value) { const d = new Date(value+'T12:00'); setVy(d.getFullYear()); setVm(d.getMonth()); }
    }, [value]);

    const firstDow = (new Date(vy, vm, 1).getDay() + 6) % 7;
    const daysInMonth = new Date(vy, vm + 1, 0).getDate();
    const daysInPrev = new Date(vy, vm, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDow; i++) cells.push(new Date(vy, vm - 1, daysInPrev - firstDow + 1 + i));
    for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(vy, vm, d));
    const fill = (7 - cells.length % 7) % 7;
    for (let d = 1; d <= fill; d++) cells.push(new Date(vy, vm + 1, d));

    const selDate = value ? new Date(value + 'T12:00') : null;
    const fmtISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const display = selDate ? `${String(selDate.getDate()).padStart(2,'0')}/${String(selDate.getMonth()+1).padStart(2,'0')}/${selDate.getFullYear()}` : null;

    const prevM = () => { if (vm === 0) { setVy(y=>y-1); setVm(11); } else setVm(m=>m-1); };
    const nextM = () => { if (vm === 11) { setVy(y=>y+1); setVm(0); } else setVm(m=>m+1); };

    const popStyle = rect ? {
      position:'fixed', zIndex:500,
      top: rect.bottom + 6,
      left: Math.max(8, Math.min(rect.left, (window.innerWidth||375) - 268)),
      width: 260,
    } : { position:'fixed', zIndex:500, top:200, left:8, width:260 };

    return (
      <>
        <button ref={pillRef} className={`dt-pill${!value ? ' ph' : ''}`} onClick={handleToggle}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {display || 'Date'}
        </button>
        {open && ReactDOM.createPortal(
          <div className="dt-pop" style={popStyle}>
            <div className="cal-hdr">
              <button className="cal-nav" onClick={e => { e.stopPropagation(); prevM(); }}>‹</button>
              <span className="cal-ttl">{MONTHS_LONG[vm]} {vy}</span>
              <button className="cal-nav" onClick={e => { e.stopPropagation(); nextM(); }}>›</button>
            </div>
            <div className="cal-grid">
              {['L','M','M','J','V','S','D'].map((d,i) => <div key={i} className="cal-wd">{d}</div>)}
              {cells.map((date, i) => {
                const isOther = date.getMonth() !== vm;
                const isSel = selDate && date.toDateString() === selDate.toDateString();
                const isToday = date.toDateString() === today.toDateString();
                return (
                  <button key={i}
                    className={`cal-d${isSel?' sel':''}${isToday&&!isSel?' today':''}${isOther?' other':''}`}
                    onClick={e => { e.stopPropagation(); onChange(fmtISO(date)); }}
                  >{date.getDate()}</button>
                );
              })}
            </div>
          </div>,
          document.body
        )}
      </>
    );
  }

  // ─── TIME PICKER PILL ────────────────────────────────────────────────────
  function TimePickerPill({ value, open, onToggle, onChange }) {
    const pillRef = useRef(null);
    const listRef = useRef(null);
    const [rect, setRect] = useState(null);

    const handleToggle = () => {
      if (!open && pillRef.current) setRect(pillRef.current.getBoundingClientRect());
      onToggle();
    };

    useEffect(() => {
      if (open && listRef.current && value) {
        const el = listRef.current.querySelector('.t-opt.sel');
        if (el) setTimeout(() => el.scrollIntoView({ block:'center' }), 10);
      }
    }, [open, value]);

    const popStyle = rect ? {
      position:'fixed', zIndex:500,
      top: rect.bottom + 6,
      left: Math.max(8, Math.min(rect.left, (window.innerWidth||375) - 140)),
      width: 130,
    } : { position:'fixed', zIndex:500, top:200, left:8, width:130 };

    return (
      <>
        <button ref={pillRef} className={`dt-pill${!value ? ' ph' : ''}`} onClick={handleToggle}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
          </svg>
          {value || 'Heure'}
        </button>
        {open && ReactDOM.createPortal(
          <div className="dt-pop" style={popStyle}>
            <div ref={listRef} className="t-list">
              {TIME_SLOTS.map(t => (
                <button key={t} className={`t-opt${value===t?' sel':''}`}
                  onClick={e => { e.stopPropagation(); onChange(t); }}
                >{t}</button>
              ))}
            </div>
          </div>,
          document.body
        )}
      </>
    );
  }

  // ─── EVENT MODAL ──────────────────────────────────────────────────────────
  function EventModal({ users, cu, foyer, onClose, onCreated }) {
    const [titre, setTitre] = useState('');
    const [concernes, setConcernes] = useState([]);
    const [foyerSel, setFoyerSel] = useState(false);
    const [dateDay, setDateDay] = useState('');
    const [dateTime, setDateTime] = useState('08:00');
    const [duree, setDuree] = useState(60);
    const [busy, setBusy] = useState(false);
    const [openPicker, setOpenPicker] = useState(null);

    const toggleConcerne = prenom => setConcernes(prev =>
      prev.includes(prenom) ? prev.filter(p => p !== prenom) : [...prev, prenom]
    );

    const create = async () => {
      const t = titre.trim();
      if (!t || !dateDay || !dateTime || busy) return;
      setBusy(true);
      const { data, error } = await db.from('evenements').insert({
        titre: t,
        date_debut: (() => {
          const off = -new Date().getTimezoneOffset();
          const sign = off >= 0 ? '+' : '-';
          const pad = n => String(Math.floor(Math.abs(n))).padStart(2, '0');
          return `${dateDay}T${dateTime}:00${sign}${pad(off/60)}:${pad(off%60)}`;
        })(),
        duree_minutes: duree,
        concernes,
        foyer: foyerSel,
        cree_par: cu?.prenom || null,
      }).select().single();
      setBusy(false);
      if (!error && data) onCreated(data);
    };

    const canCreate = titre.trim() && dateDay && dateTime && !busy;

    return (
      <div className="modal-ov" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
        {openPicker && ReactDOM.createPortal(
          <div style={{ position:'fixed', inset:0, zIndex:490 }} onClick={() => setOpenPicker(null)} />,
          document.body
        )}
        <div className="modal-sheet">
          <div className="modal-hdr">
            <div>
              <div className="modal-sub">{foyer}</div>
              <div className="modal-title">Événement</div>
            </div>
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>

          <div className="modal-body">
            <div style={{ marginBottom:16 }}>
              <div className="ev-modal-sec">Objet</div>
              <input
                autoFocus
                className="ev-modal-field"
                placeholder="Titre de l'événement…"
                value={titre}
                onChange={e => setTitre(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && create()}
                maxLength={60}
              />
            </div>

            <div style={{ marginBottom:16 }}>
              <div className="ev-modal-sec">Concerné</div>
              <div className="concerned-row">
                {users.map(u => (
                  <div
                    key={u.id}
                    className={`concern-av${concernes.includes(u.prenom) ? ' sel' : ''}`}
                    onClick={() => toggleConcerne(u.prenom)}
                  >
                    <Av prenom={u.prenom} couleur={uColor(u)} size="sm" />
                  </div>
                ))}
                <button
                  className={`foyer-toggle${foyerSel ? ' sel' : ''}`}
                  onClick={() => setFoyerSel(v => !v)}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={foyerSel ? 'var(--blue)' : 'var(--text2)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    <polyline points="9,22 9,12 15,12 15,22"/>
                  </svg>
                </button>
              </div>
            </div>

            <div style={{ marginBottom:16 }}>
              <div className="ev-modal-sec">Date et heure</div>
              <div className="dt-row">
                <DatePickerPill
                  value={dateDay}
                  open={openPicker === 'date'}
                  onToggle={() => setOpenPicker(p => p === 'date' ? null : 'date')}
                  onChange={v => { setDateDay(v); setOpenPicker(null); }}
                />
                <TimePickerPill
                  value={dateTime}
                  open={openPicker === 'time'}
                  onToggle={() => setOpenPicker(p => p === 'time' ? null : 'time')}
                  onChange={v => { setDateTime(v); setOpenPicker(null); }}
                />
              </div>
            </div>

            <div style={{ marginBottom:8 }}>
              <div className="ev-modal-sec">Durée</div>
              <div className="dur-pills">
                {DURATIONS.map(d => (
                  <button key={d.val} className={`dur-pill${duree === d.val ? ' sel' : ''}`} onClick={() => setDuree(d.val)}>
                    {d.label}
                  </button>
                ))}
              </div>
            </div>

          </div>
          <div className="modal-footer">
            <button
              onClick={create}
              disabled={!canCreate}
              style={{

  // ─── SCREEN B — Main ──────────────────────────────────────────────────────
  function ScreenB({ cu, users, items, foyer, onList, onTeam, onAdded, rtOn, events, onEventDelete, onEventModal }) {

    const [busy, setBusy] = useState(false);

    const inputRef = useRef(null);

    const col = uColor(cu);
    const lightBg = cu ? `rgba(${hex2rgb(col)},.1)` : 'var(--bg)';
    const unchecked = items.filter(i => !i.coche).length;

    const add = async () => {
      const t = val.trim(); if (!t || busy || !cu) return;
      setBusy(true);
      arcFly(inputRef.current, heroRef.current, t, col);
      setVal('');
      const { data, error } = await db.from('items').insert({ texte:t, auteur:cu.prenom, coche:false }).select().single();
      setBusy(false);
      if (!error && data) {
        onAdded(data, t);
        categorizeAndSave(data);
      }

    };

    const now = new Date();
    const upcomingEvents = events
      .filter(ev => new Date(ev.date_debut) >= now)
      .sort((a, b) => new Date(a.date_debut) - new Date(b.date_debut));

    return (
      <div className="screen">
        <div className="sb-head">

                  <polyline points="10,20 17,27 30,13" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>

              </>
            ) : (
              <>
                <div className="hero-label" style={{ color:'#aaa' }}>Profil</div>
                <div style={{ color:'var(--blue)', fontSize:14, marginTop:8 }}>Choisir →</div>
              </>
            )}

        </div>

        <div className="add-block" style={{ background:lightBg }}>
          <div className="add-micro">Il manque quelque chose ?</div>
          <div className="add-row">
            <input ref={inputRef} className="add-input" placeholder="Ajouter un article…" value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} maxLength={60} disabled={!cu} />
            <button className="add-btn" style={{ background:cu?col:'#ccc' }} onClick={add} disabled={!cu||busy}>

              </svg>

          </div>
          {upcomingEvents.length === 0 ? (
            <div className="ev-empty">Aucun événement à venir</div>

  // ─── SCREEN C — Shopping list ─────────────────────────────────────────────
  function ScreenC({ items, users, onBack, onToggle, onDelete, onDeleteBought, newItemId }) {
    const [sort, setSort] = useState('recent');
    const [ddOpen, setDdOpen] = useState(false);
    const [openItemId, setOpenItemId] = useState(null);

    const unchecked = items.filter(i => !i.coche);
    const checked = [...items.filter(i => i.coche)].sort((a,b) => new Date(b.cree_le)-new Date(a.cree_le));

    const renderItem = i => <ItemRow key={i.id} item={i} users={users} onToggle={onToggle} onDelete={onDelete} isNew={i.id===newItemId} isOpen={i.id===openItemId} onOpen={setOpenItemId} />;

    const renderList = () => {
      if (sort === 'rayon') {
        const groups = {};
        unchecked.forEach(i => { const r = i.rayon||'Autre'; if (!groups[r]) groups[r]=[]; groups[r].push(i); });
        return Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([r, its]) => (
          <React.Fragment key={r}>
            <div className="sep-row">{r}</div>
            {its.map(renderItem)}
          </React.Fragment>
        ));
      }
      return unchecked.map(renderItem);
    };

    return (

    );
  }

  // ─── SWIPEABLE TEAM ROW ───────────────────────────────────────────────────
  function SwipeableTeamRow({ u, sel, col, cpFor, setCpFor, onSelect, onColor, onDelete }) {
    const [sx, setSx] = useState(0);
    const tx = useRef(null), ty = useRef(null), mov = useRef(false);

    const onTS = e => { tx.current = e.touches[0].clientX; ty.current = e.touches[0].clientY; mov.current = false; };
    const onTM = e => {
      if (tx.current === null) return;
      const dx = e.touches[0].clientX - tx.current;
      const dy = Math.abs(e.touches[0].clientY - ty.current);
      if (!mov.current && Math.abs(dx) < 6 && dy < 6) return;
      if (!mov.current && dy > Math.abs(dx)) return;
      mov.current = true;
      if (dx < 0) { e.preventDefault(); setSx(Math.max(dx, -100)); }
    };
    const onTE = () => { if (sx < -65) onDelete(u); else setSx(0); tx.current = null; };

    return (
      <div className="team-wrap">
        <div className="team-del-bg">Supprimer</div>
        <div
          className="team-row"
          style={{ transform:`translateX(${sx}px)`, transition:tx.current?'none':'transform 280ms ease-out' }}
          onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        >
          <div onClick={() => onSelect(u)} style={{ width:22, height:22, borderRadius:'50%', border:`2px solid ${sel?'#34c759':'var(--border)'}`, background:sel?'#34c759':'transparent', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
            {sel && <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5"/></svg>}
          </div>
          <Av prenom={u.prenom} couleur={col} size="md" />
          <span style={{ flex:1, fontSize:15, cursor:'pointer' }} onClick={() => onSelect(u)}>{u.prenom}</span>
          <div
            onClick={e => { e.stopPropagation(); setCpFor(cpFor===u.id?null:u.id); }}
            style={{ width:22, height:22, borderRadius:'50%', background:col, cursor:'pointer', border:'2px solid rgba(0,0,0,.1)', flexShrink:0 }}
          />
          {cpFor===u.id && (
            <div className="color-picker" onClick={e=>e.stopPropagation()}>
              {COLORS.map(c => (
                <div key={c} className={`c-dot${c===col?' sel':''}`} style={{ background:c }}
                  onClick={() => { onColor(u, c); setCpFor(null); }} />
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ─── TEAM MODAL — Screen D ────────────────────────────────────────────────
  function TeamModal({ users, cu, foyer, onClose, onSelect, onColor, onDelete, onNewUser, onUpdateFoyer }) {
    const [cpFor, setCpFor] = useState(null);
    const [open, setOpen] = useState(false);
    const [name, setName] = useState('');
    const [busy, setBusy] = useState(false);
    const [editFoyer, setEditFoyer] = useState(false);
    const [foyerVal, setFoyerVal] = useState(foyer);

    const saveFoyer = () => {
      const v = foyerVal.trim();
      if (!v) return;
      setEditFoyer(false);
      onUpdateFoyer(v);
    };

    const create = async () => {
      const p = name.trim(); if (!p || busy) return;
      const ex = users.find(u => u.prenom === p);
      if (ex) { onSelect(ex); onClose(); return; }
      setBusy(true);
      const col = COLORS[users.length % COLORS.length];
      const { data, error } = await db.from('utilisateurs').insert({ prenom:p, couleur:col }).select().single();
      setBusy(false);
      if (!error && data) { onNewUser(data); setOpen(false); setName(''); }

    return (
      <div className="modal-ov" onClick={e => { if (e.target===e.currentTarget) onClose(); }}>

              {editFoyer ? (
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>

                    style={{ border:'none', borderBottom:'1.5px solid var(--blue)', background:'transparent', fontSize:13, color:'var(--text2)', outline:'none', width:'100%', maxWidth:200, minWidth:0 }}
                  />
                  <button onClick={saveFoyer} style={{ fontSize:12, color:'var(--blue)', background:'none', border:'none', fontWeight:600, cursor:'pointer' }}>OK</button>

              <button className="inline-btn muted" onClick={() => { setOpen(false); setName(''); }}>✕</button>

              <button className="fab" onClick={() => setOpen(true)}>+</button>

          )}

      </div>
    );
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // APP
  // ═══════════════════════════════════════════════════════════════════════════
  function App() {
    const [screen, setScreen] = useState('loading');
    const [users, setUsers] = useState([]);
    const [items, setItems] = useState([]);
    const [events, setEvents] = useState([]);
    const [cu, setCu] = useState(null);
    const [foyer, setFoyer] = useState('Mon foyer');
    const [team, setTeam] = useState(false);
    const [eventModal, setEventModal] = useState(false);
    const [toast, setToast] = useState(null);
    const [rtOn, setRtOn] = useState(false);
    const [newId, setNewId] = useState(null);
    const toastId = useRef(0);

    // ── Init ──────────────────────────────────────────────────────────────
    useEffect(() => {
      (async () => {
        const [{ data:us }, { data:it }, { data:cfg }, { data:evs }] = await Promise.all([
          db.from('utilisateurs').select('*').order('cree_le'),
          db.from('items').select('*').order('cree_le', { ascending:false }),
          db.from('config').select('valeur').eq('cle','nom_foyer').single(),
          db.from('evenements').select('*').order('date_debut'),
        ]);
        if (us) setUsers(us);
        if (it) setItems(it);
        if (cfg) setFoyer(cfg.valeur);
        if (evs) setEvents(evs);

        if (it) {
          const todo = it.filter(i => !i.rayon);
          if (todo.length > 0) {
            console.log(`[Rayon] ${todo.length} item(s) sans rayon — catégorisation rétroactive…`);
            for (const item of todo) {
              const rayon = await categorize(item.texte);
              if (rayon) {
                await db.from('items').update({ rayon }).eq('id', item.id);
                setItems(prev => prev.map(i => i.id===item.id ? { ...i, rayon } : i));
              }
            }
          }
        }

        const saved = (() => { try { return JSON.parse(localStorage.getItem('uzi:user')); } catch { return null; } })();
        if (saved && us?.find(u => u.id===saved.id)) {
          setCu(us.find(u => u.id===saved.id));
          setScreen('B');
        } else {
          setScreen('A');
        }
      })();
    }, []);

    // ── Realtime ───────────────────────────────────────────────────────────
    useEffect(() => {
      const ch = db.channel('uzi')
        .on('postgres_changes', { event:'*', schema:'public', table:'items' }, p => {
          if (p.eventType==='INSERT') setItems(prev => [p.new, ...prev.filter(i => i.id!==p.new.id)]);
          else if (p.eventType==='UPDATE') setItems(prev => prev.map(i => i.id===p.new.id ? p.new : i));
          else if (p.eventType==='DELETE') setItems(prev => prev.filter(i => i.id!==p.old.id));
        })
        .on('postgres_changes', { event:'*', schema:'public', table:'utilisateurs' }, p => {
          if (p.eventType==='INSERT') setUsers(prev => [...prev.filter(u=>u.id!==p.new.id), p.new].sort((a,b)=>new Date(a.cree_le)-new Date(b.cree_le)));
          else if (p.eventType==='UPDATE') {
            setUsers(prev => prev.map(u => u.id===p.new.id ? p.new : u));
            setCu(prev => prev?.id===p.new.id ? p.new : prev);
          }
          else if (p.eventType==='DELETE') setUsers(prev => prev.filter(u => u.id!==p.old.id));
        })
        .on('postgres_changes', { event:'*', schema:'public', table:'evenements' }, p => {
          if (p.eventType==='INSERT') setEvents(prev => [...prev.filter(e=>e.id!==p.new.id), p.new].sort((a,b)=>new Date(a.date_debut)-new Date(b.date_debut)));
          else if (p.eventType==='UPDATE') setEvents(prev => prev.map(e => e.id===p.new.id ? p.new : e));
          else if (p.eventType==='DELETE') setEvents(prev => prev.filter(e => e.id!==p.old.id));
        })
        .subscribe(s => setRtOn(s==='SUBSCRIBED'));
      return () => db.removeChannel(ch);
    }, []);

    // ── Toast ──────────────────────────────────────────────────────────────
    const showToast = useCallback((message, onCancel) => {
      const id = ++toastId.current;
      setToast({ id, message, onCancel, onDone:() => setToast(t => t?.id===id ? null : t) });
    }, []);

    // ── Handlers ──────────────────────────────────────────────────────────
    const login = useCallback(u => {
      setCu(u); localStorage.setItem('uzi:user', JSON.stringify(u)); setScreen('B');
    }, []);

    const handleAdded = useCallback((item, texte) => {
      setItems(prev => [item, ...prev.filter(i => i.id!==item.id)]);
      setNewId(item.id);
      setTimeout(() => setNewId(null), 400);
      showToast(`${texte} ajouté`, async () => {
        await db.from('items').delete().eq('id', item.id);
        setItems(prev => prev.filter(i => i.id!==item.id));
      });
    }, [showToast]);

    const handleToggle = useCallback(async item => {
      const nc = !item.coche;
      setItems(prev => prev.map(i => i.id===item.id ? { ...i, coche:nc } : i));
      await db.from('items').update({ coche:nc }).eq('id', item.id);
      showToast(`${item.texte} ${nc?'acheté':'remis en liste'}`, async () => {
        setItems(prev => prev.map(i => i.id===item.id ? { ...i, coche:!nc } : i));
        await db.from('items').update({ coche:!nc }).eq('id', item.id);
      });
    }, [showToast]);

    const handleDelete = useCallback(async id => {
      const item = items.find(i => i.id===id);
      setItems(prev => prev.filter(i => i.id!==id));
      await db.from('items').delete().eq('id', id);
      if (item) showToast(`${item.texte} supprimé`, async () => {
        const { data } = await db.from('items').insert({ texte:item.texte, auteur:item.auteur, coche:item.coche, rayon:item.rayon }).select().single();
        if (data) setItems(prev => [data, ...prev]);
      });
    }, [items, showToast]);

    const handleDeleteBought = useCallback(async () => {
      const bought = items.filter(i => i.coche);
      if (!bought.length) return;

      setItems(prev => prev.filter(i => !i.coche));

      const { error, count } = await db
        .from('items')
        .delete({ count: 'exact' })
        .eq('coche', true);

      if (error) {
        console.error('[Supprimer] Échec DELETE :', error.message);
        setItems(prev => [...prev, ...bought]);
        return;
      }
      console.log(`[Supprimer] ${count ?? bought.length} produit(s) supprimé(s) de Supabase`);

      // onCancel est appelé UNIQUEMENT si l'utilisateur clique "Annuler".
      // Le toast qui expire seul n'appelle jamais onCancel — le DELETE est définitif.
      // Undo : coche=false pour remettre les articles dans la liste à acheter,
      // pas en "produits achetés" (évite la réapparition au rechargement).
      showToast('Liste supprimée', async () => {
        const { data, error: e2 } = await db
          .from('items')
          .insert(bought.map(i => ({ texte:i.texte, auteur:i.auteur, coche:false, rayon:i.rayon })))
          .select();
        if (e2) console.error('[Supprimer] Échec undo :', e2.message);
        if (data) setItems(prev => [...prev, ...data]);
      });
    }, [items, showToast]);

    const handleSelectUser = useCallback(u => {
      setCu(u); localStorage.setItem('uzi:user', JSON.stringify(u));
    }, []);

    const handleColor = useCallback(async (u, color) => {
      setUsers(prev => prev.map(x => x.id===u.id ? { ...x, couleur:color } : x));
      if (cu?.id===u.id) { const nu = { ...cu, couleur:color }; setCu(nu); localStorage.setItem('uzi:user', JSON.stringify(nu)); }
      await db.from('utilisateurs').update({ couleur:color }).eq('id', u.id);
    }, [cu]);

    const handleNewUser = useCallback(u => {
      setUsers(prev => [...prev.filter(x => x.id!==u.id), u]);
    }, []);

    const handleUpdateFoyer = useCallback(async name => {
      setFoyer(name);
      await db.from('config').upsert({ cle:'nom_foyer', valeur:name }, { onConflict:'cle' });
    }, []);

    const handleDeleteUser = useCallback(async u => {
      setUsers(prev => prev.filter(x => x.id!==u.id));
      if (cu?.id===u.id) {
        setCu(null);
        localStorage.removeItem('uzi:user');
        setTeam(false);
        setScreen('A');
      }
      await db.from('utilisateurs').delete().eq('id', u.id);
    }, [cu]);

    const handleEventDelete = useCallback(async id => {
      const ev = events.find(e => e.id === id);
      setEvents(prev => prev.filter(e => e.id !== id));
      await db.from('evenements').delete().eq('id', id);
      if (ev) showToast(`${ev.titre} supprimé`, async () => {
        const { data } = await db.from('evenements').insert({
          titre: ev.titre, date_debut: ev.date_debut, duree_minutes: ev.duree_minutes,
          concernes: ev.concernes, foyer: ev.foyer, cree_par: ev.cree_par,
        }).select().single();
        if (data) setEvents(prev => [...prev, data].sort((a,b) => new Date(a.date_debut)-new Date(b.date_debut)));
      });
    }, [events, showToast]);

    const handleEventCreated = useCallback(ev => {
      setEvents(prev => [...prev, ev].sort((a,b) => new Date(a.date_debut)-new Date(b.date_debut)));
      setEventModal(false);
      showToast('Événement créé !');
    }, [showToast]);

    // ── Transition styles ──────────────────────────────────────────────────
    const scStyle = s => {
      const base = { position:'absolute', inset:0, background:'var(--bg)', overflow:'hidden', maxWidth:'100%' };
      if (s==='A') return { ...base,
        transform: screen==='A' ? 'none' : 'translateY(-4%) scale(.98)',
        opacity: screen==='A' ? 1 : 0,
        zIndex: screen==='A' ? 4 : 1,
        transition:'transform 350ms ease-out, opacity 280ms ease-out' };
      if (s==='B') {
        const tf = screen==='A' ? 'translateY(100%)' : screen==='C' ? 'translateX(-30%)' : 'none';
        return { ...base, transform:tf, zIndex:screen==='B'?3:screen==='C'?2:1, transition:'transform 350ms ease-out' };
      }
      if (s==='C') return { ...base,
        transform: screen==='C' ? 'none' : 'translateX(100%)',
        zIndex: screen==='C' ? 3 : 1,
        transition:'transform 300ms ease-out' };
      return base;
    };

    if (screen==='loading') return <div className="loading"><div className="spinner"/>Chargement…</div>;

    return (
      <div className="app">
        <div style={scStyle('A')}><ScreenA users={users} onLogin={login} loading={false} /></div>
        <div style={scStyle('B')}>
          <ScreenB
            cu={cu} users={users} items={items} foyer={foyer}
            onList={() => setScreen('C')} onTeam={() => setTeam(true)}
            onAdded={handleAdded} rtOn={rtOn}
            events={events}
            onEventDelete={handleEventDelete}
            onEventModal={() => setEventModal(true)}
          />
        </div>
        <div style={scStyle('C')}>
          <ScreenC items={items} users={users} onBack={() => setScreen('B')} onToggle={handleToggle} onDelete={handleDelete} onDeleteBought={handleDeleteBought} newItemId={newId} />
        </div>
        {team && (
          <TeamModal users={users} cu={cu} foyer={foyer} onClose={() => setTeam(false)} onSelect={u => { handleSelectUser(u); setTeam(false); }} onColor={handleColor} onDelete={handleDeleteUser} onNewUser={handleNewUser} onUpdateFoyer={handleUpdateFoyer} />
        )}
        {eventModal && (
          <EventModal users={users} cu={cu} foyer={foyer} onClose={() => setEventModal(false)} onCreated={handleEventCreated} />
        )}
        <Toast toast={toast} />
      </div>
    );
  }

  // ─── MOUNT ────────────────────────────────────────────────────────────────
  createRoot(document.getElementById('root')).render(<App />);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
  </script>
</body>
</html>
